[filter]
# 제목/직무에 하나라도 포함되면 통과 (쉼표로 구분, 비워두면 전체허용)
keywords = 기획, PM

# 근무 지역 (쉼표로 구분, 비워두면 전체허용)
# 원티드 API는 "판교"·"성남" 같은 시/군/구 단위 지역 정보를 제공하지 않고 "경기"처럼
# 시/도 단위로만 준다. 판교/성남 지역의 원티드 공고까지 잡으려면 "경기"를 함께 넣어야 한다
# (사람인은 시/군/구 단위라 "경기"를 넣으면 판교/성남 외 경기 전역 공고도 함께 통과됨)
locations = 서울, 판교, 인천, 성남, 경기

# 경력 구분: 신입 / 경력 / 신입·경력 / 비워두면 전체허용
career_type = 신입·경력

# 경력 연차 범위 (비워두면 해당 방향 제한없음)
exp_min = 
exp_max = 5

# 채용공고가 아닌 것으로 간주해 제외할 단어 (쉼표로 구분)
# KEYWORDS가 제목이 아닌 직무 태그에만 걸린 경우에 한해 검사한다
exclude_keywords = 교육생, 무료교육, 설명회, 상시채용
